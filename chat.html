<!DOCTYPE html>
<html>
<head>
    <title>AI Tutor Chatbot</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">

    <h2>AI Tutor 🤖</h2>

    <form method="POST">
        <input type="text" name="message" placeholder="Ask a question..." class="chat-input">
        <button type="submit">Send</button>
    </form>

    <div class="chat-response">
        <h3>Response:</h3>
        <p>{{ response }}</p>
    </div>

    <a href="/dashboard">Back to Dashboard</a>

</div>

</body>
</html>
